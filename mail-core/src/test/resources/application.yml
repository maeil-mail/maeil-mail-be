spring:
  main:
    allow-bean-definition-overriding: true

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        auto_quote_keyword: true
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: never

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL

  mail:
    host: smtp.gmail.com
    port: 587
    username: atom
    password: mock
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true

distribute:
  server:
    count: 1
    index: 1

mail:
  ses:
    rate-limit:
      bucket-key: ses-mail-core-test
      capacity: 10
      refill-amount: 10
      refill-seconds: 1
      wait-timeout-millis: 2000
